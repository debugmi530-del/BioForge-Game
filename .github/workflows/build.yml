name: Build BioForge Windows Installer

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.2.2"
  EXPORT_NAME: "BioForge"
  EXPORT_PATH: "build/windows"

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: ubuntu-22.04

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Install Godot 4 ──────────────────────────────────────────────────────
      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip"
          mv "Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      # ── Install export templates ─────────────────────────────────────────────
      - name: Install Godot export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      # ── Install NSIS ─────────────────────────────────────────────────────────
      - name: Install NSIS and ImageMagick
        run: sudo apt-get install -y nsis imagemagick

      # ── Create build directory ───────────────────────────────────────────────
      - name: Create build directory
        run: mkdir -p ${{ env.EXPORT_PATH }}

      # ── Import project (files are at repo root after checkout) ───────────────
      - name: Import Godot project
        run: |
          godot --headless --import --quit || true
          sleep 3

      # ── Export Windows build ─────────────────────────────────────────────────
      - name: Export Windows desktop
        run: |
          godot --headless --export-release "Windows Desktop" "${{ env.EXPORT_PATH }}/${{ env.EXPORT_NAME }}.exe"

      # ── Convert PNG icon to ICO ───────────────────────────────────────────────
      - name: Convert icon to ICO
        run: |
          if [ -f "assets/icon.png" ]; then
            convert assets/icon.png -resize 256x256 assets/icon.ico || true
          fi

      # ── Create NSIS installer script ─────────────────────────────────────────
      - name: Create NSIS installer script
        run: |
          cat > installer.nsi << 'NSIS_EOF'
          !define APP_NAME "BioForge"
          !define APP_VERSION "1.0.0"
          !define APP_EXE "BioForge.exe"

          Name "${APP_NAME}"
          OutFile "BioForge-Setup.exe"
          Unicode True
          InstallDir "$PROGRAMFILES64\BioForge"
          InstallDirRegKey HKLM "Software\BioForge" "Install_Dir"
          RequestExecutionLevel admin

          !include "MUI2.nsh"
          !define MUI_ABORTWARNING

          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          !insertmacro MUI_UNPAGE_CONFIRM
          !insertmacro MUI_UNPAGE_INSTFILES

          !insertmacro MUI_LANGUAGE "Russian"
          !insertmacro MUI_LANGUAGE "English"

          Section "BioForge (required)" SecMain
            SectionIn RO
            SetOutPath "$INSTDIR"
            File /r "build\windows\*"
            WriteRegStr HKLM "Software\BioForge" "Install_Dir" "$INSTDIR"
            WriteUninstaller "$INSTDIR\Uninstall.exe"
            CreateDirectory "$SMPROGRAMS\BioForge"
            CreateShortCut "$SMPROGRAMS\BioForge\BioForge.lnk" "$INSTDIR\${APP_EXE}"
            CreateShortCut "$DESKTOP\BioForge.lnk" "$INSTDIR\${APP_EXE}"
          SectionEnd

          Section "Uninstall"
            RMDir /r "$INSTDIR"
            Delete "$SMPROGRAMS\BioForge\BioForge.lnk"
            RMDir "$SMPROGRAMS\BioForge"
            Delete "$DESKTOP\BioForge.lnk"
            DeleteRegKey HKLM "Software\BioForge"
          SectionEnd
          NSIS_EOF

      # ── Build installer ──────────────────────────────────────────────────────
      - name: Build NSIS installer
        run: makensis installer.nsi

      # ── Upload installer as artifact ─────────────────────────────────────────
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: BioForge-Windows-Installer
          path: BioForge-Setup.exe
          retention-days: 30

      # ── Create GitHub Release on tag push ────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: BioForge-Setup.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
